root = "."
tmp_dir = "tmp"

[build]
  bin = "./bin/palauth"
  cmd = "go build -o ./bin/palauth ./cmd/server"
  delay = 1000
  exclude_dir = ["bin", "tmp", "docker", "migrations", "dashboard", "sdk", "node_modules"]
  exclude_regex = ["_test\\.go$"]
  include_ext = ["go", "yaml", "yml"]
  kill_delay = 500

[log]
  time = false

[misc]
  clean_on_exit = true
