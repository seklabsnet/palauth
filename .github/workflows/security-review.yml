name: Security Review

on:
  pull_request:
    branches: [main, dev]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  sast:
    name: Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run gosec
        uses: securego/gosec@master
        with:
          args: ./...

      - name: Run govulncheck
        uses: golang/govulncheck-action@v1
        with:
          go-version-input: "1.26"

  claude-review:
    name: Claude Security Review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Review this pull request for security vulnerabilities. Read .github/security-scan-instructions.md for project-specific security rules.
            Analyze the diff and post findings as review comments on the specific lines.
            Focus on: auth bypass, injection, hardcoded secrets, weak crypto, timing attacks, enumeration, missing audit logs.
            Follow CLAUDE.md security rules strictly.
          claude_args: "--max-turns 5"
