services:
  palauth:
    build:
      context: ..
      dockerfile: docker/Dockerfile.server
      target: builder
    working_dir: /app
    command: ["air", "-c", ".air.toml"]
    ports:
      - "3000:3000"
    environment:
      PALAUTH_DATABASE_URL: postgres://palauth:palauth_dev@postgres:5432/palauth?sslmode=disable
      PALAUTH_REDIS_URL: redis://redis:6379
      PALAUTH_AUTH_PEPPER: dev-pepper-at-least-32-bytes-long!!
      PALAUTH_EMAIL_PROVIDER: console
      PALAUTH_SERVER_HOST: 0.0.0.0
      PALAUTH_LOG_LEVEL: debug
    volumes:
      - ..:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: palauth
      POSTGRES_PASSWORD: palauth_dev
      POSTGRES_DB: palauth
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U palauth"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata_dev:
