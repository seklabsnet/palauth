services:
  server:
    build:
      context: ..
      dockerfile: docker/Dockerfile.server
    ports:
      - "3000:3000"
    environment:
      PALAUTH_DATABASE_URL: postgres://palauth:palauth@postgres:5432/palauth?sslmode=disable
      PALAUTH_REDIS_URL: redis://redis:6379
      PALAUTH_PEPPER: ${PALAUTH_PEPPER}
      PALAUTH_EMAIL_PROVIDER: console
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  dashboard:
    build:
      context: ../dashboard
      dockerfile: Dockerfile
    ports:
      - "3001:3000"
    environment:
      PALAUTH_URL: http://server:3000
    depends_on:
      - server

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: palauth
      POSTGRES_PASSWORD: palauth
      POSTGRES_DB: palauth
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U palauth"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
