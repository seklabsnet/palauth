<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your verification code</title>
</head>
<body style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; color: #333;">
  <h2 style="color: #1a1a1a;">Your verification code</h2>
  <p>Hi,</p>
  <p>Use the following code to verify your email address for <strong>{{.ProjectName}}</strong>:</p>
  <p style="font-size: 32px; font-weight: bold; letter-spacing: 8px; text-align: center; margin: 30px 0; color: #1a1a1a;">{{.Code}}</p>
  <p>This code expires in {{.ExpiryMinutes}} minutes.</p>
  <hr style="border: none; border-top: 1px solid #eee; margin: 30px 0;">
  <p style="color: #999; font-size: 12px;">If you did not create an account, you can safely ignore this email.</p>
</body>
</html>
